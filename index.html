<!DOCTYPE html>
<html>
<head>
  <title>My Cool Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    .btn {
      background-color: white;
      color: #333;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #333;
      color: white;
    }
  </style>
</head>

<body>

  <h1>Welcome to My Website 🚀</h1>
  <p>This is my cool website made for free!</p>

  <button class="btn" onclick="alert('Hello 👋')">Click Me</button>

  <button class="btn" onclick="changeColor()">Change Background</button>

  <script>
    function changeColor() {
      document.body.style.background = "linear-gradient(to right, #ff6a00, #ee0979)";
    }
  </script>

</body>
</html>
